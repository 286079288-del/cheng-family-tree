<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生辰忌辰 - 东郭程氏族谱</title>
<style>
:root{--bg:#f0e6d0;--bg-grad:#f5efe0;--gold:#b8833a;--gold-light:#d4a860;--text:#3d3025;--text-light:#8a7b68;--accent:#8b2e2e;--male:#92b4cc;--female:#c898a5;--male-light:#d0e4f0;--female-light:#f0d8de;--card-bg:rgba(255,253,248,0.92)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Serif SC","STSong","SimSun","KaiTi",serif;background:linear-gradient(180deg,var(--bg-grad),var(--bg));color:var(--text);min-height:100vh;display:flex;flex-direction:column}

.topbar{background:rgba(255,255,255,0.25);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(200,180,150,0.3);padding:10px 28px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{font-size:16px;letter-spacing:5px;display:flex;align-items:center;gap:10px;color:var(--text)}
.topbar h1 .seal{width:30px;height:30px;border:2px solid var(--gold);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--gold);font-weight:700;background:rgba(184,131,58,0.08)}
.topbar-actions{display:flex;gap:6px;align-items:center}
.back-link{font-size:12px;color:var(--text-light);text-decoration:none;display:flex;align-items:center;gap:6px;transition:all .2s;letter-spacing:1px}
.back-link:hover{color:var(--accent)}

.content{flex:1;max-width:1100px;margin:0 auto;width:100%;padding:24px 20px}

/* 月份导航 */
.month-nav{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:28px}
.month-nav .arrow{width:36px;height:36px;border-radius:50%;border:1px solid rgba(184,131,58,0.25);background:rgba(255,253,248,0.9);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--gold);transition:all .2s}
.month-nav .arrow:hover{background:var(--gold);color:#fff;border-color:var(--gold)}
.month-nav .month-label{font-size:22px;letter-spacing:6px;font-weight:600;color:var(--text)}
.month-nav .year-label{font-size:13px;color:var(--text-light);letter-spacing:2px;margin-top:2px;text-align:center}

/* 日历网格 */
.calendar{background:var(--card-bg);border-radius:16px;box-shadow:0 4px 24px rgba(100,70,40,0.08);border:1px solid rgba(184,131,58,0.12);overflow:hidden;margin-bottom:32px}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);background:linear-gradient(135deg,rgba(184,131,58,0.08),rgba(184,131,58,0.04));border-bottom:1px solid rgba(184,131,58,0.1)}
.cal-header .hd{padding:10px 4px;text-align:center;font-size:12px;letter-spacing:2px;color:var(--text-light);font-weight:600}
.cal-header .hd.sun{color:var(--accent)}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-cell{min-height:90px;border-right:1px solid rgba(184,131,58,0.06);border-bottom:1px solid rgba(184,131,58,0.06);padding:4px 6px;position:relative;transition:background .2s}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:rgba(184,131,58,0.04)}
.cal-cell.other-month{opacity:0.3}
.cal-cell.today{background:rgba(184,131,58,0.06)}
.cal-cell .day-num{font-size:13px;font-weight:600;color:var(--text-light);margin-bottom:3px;display:inline-block;min-width:22px;height:22px;line-height:22px;text-align:center;border-radius:50%}
.cal-cell.today .day-num{background:var(--gold);color:#fff}
.cal-cell .day-num.sun{color:var(--accent)}
.cal-cell .events{display:flex;flex-direction:column;gap:2px}
.event-tag{font-size:10px;padding:2px 6px;border-radius:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:all .2s;letter-spacing:0.5px;line-height:1.4}
.event-tag.birth-male{background:var(--male-light);color:#4a6e84;border-left:2px solid var(--male)}
.event-tag.birth-female{background:var(--female-light);color:#7a4a5a;border-left:2px solid var(--female)}
.event-tag.death-male{background:rgba(139,46,46,0.06);color:#7a4040;border-left:2px solid var(--accent)}
.event-tag.death-female{background:rgba(139,46,46,0.06);color:#7a4a5a;border-left:2px solid var(--accent)}
.event-tag:hover{transform:scale(1.04);box-shadow:0 2px 8px rgba(100,70,40,0.12)}

/* 右侧列表 */
.layout{display:flex;gap:24px;align-items:flex-start}
.layout .left{flex:1;min-width:0}
.sidebar{width:280px;flex-shrink:0;position:sticky;top:70px}
.sidebar-card{background:var(--card-bg);border-radius:14px;box-shadow:0 4px 20px rgba(100,70,40,0.08);border:1px solid rgba(184,131,58,0.12);overflow:hidden;margin-bottom:16px}
.sidebar-card .sc-title{padding:12px 16px;font-size:13px;letter-spacing:3px;font-weight:600;border-bottom:1px solid rgba(184,131,58,0.1);display:flex;align-items:center;gap:8px}
.sidebar-card .sc-title .ico{font-size:16px}
.sidebar-card .sc-body{padding:12px 16px;max-height:360px;overflow-y:auto}
.sc-item{padding:8px 0;border-bottom:1px solid rgba(184,131,58,0.06);display:flex;align-items:center;gap:10px}
.sc-item:last-child{border-bottom:none}
.sc-item .sc-date{font-size:11px;color:var(--text-light);white-space:nowrap;min-width:50px}
.sc-item .sc-name{font-size:13px;font-weight:600;flex:1}
.sc-item .sc-badge{font-size:9px;padding:2px 6px;border-radius:6px;letter-spacing:1px}
.sc-badge.birthday{background:var(--male-light);color:#4a6e84}
.sc-badge.memorial{background:rgba(139,46,46,0.08);color:var(--accent)}
.sc-item.female .sc-badge.birthday{background:var(--female-light);color:#7a4a5a}

/* 空状态 */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-light)}
.empty-state .ico{font-size:48px;opacity:0.2;margin-bottom:12px}
.empty-state p{font-size:13px;letter-spacing:1px;line-height:1.8}

/* 弹窗 */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(60,40,20,0.3);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-box{background:#faf6ee;border-radius:16px;box-shadow:0 12px 48px rgba(60,40,20,0.2);max-width:380px;width:90%;overflow:hidden;transform:scale(0.92);transition:transform .25s}
.modal-overlay.show .modal-box{transform:scale(1)}
.modal-header{padding:16px 20px;border-bottom:1px solid rgba(184,131,58,0.12);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:14px;letter-spacing:3px;color:var(--text)}
.modal-close{width:28px;height:28px;border-radius:50%;border:1px solid rgba(184,131,58,0.2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-light);transition:all .2s}
.modal-close:hover{background:rgba(184,131,58,0.1);color:var(--text)}
.modal-body{padding:20px}
.modal-body .mb-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid rgba(184,131,58,0.06)}
.modal-body .mb-row:last-child{border-bottom:none}
.modal-body .mb-label{font-size:11px;color:var(--text-light);letter-spacing:1px;min-width:60px}
.modal-body .mb-val{font-size:14px;font-weight:600;flex:1}
.modal-body .mb-val.male{color:#4a6e84}
.modal-body .mb-val.female{color:#7a4a5a}

/* 图例 */
.legend{display:flex;gap:16px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-light);letter-spacing:0.5px}
.legend-dot{width:12px;height:6px;border-radius:3px}
.legend-dot.bm{background:var(--male);border-left:2px solid var(--male)}
.legend-dot.bf{background:var(--female);border-left:2px solid var(--female)}
.legend-dot.dm{background:rgba(139,46,46,0.2);border-left:2px solid var(--accent)}
.legend-dot.df{background:rgba(139,46,46,0.2);border-left:2px solid var(--accent)}

@media(max-width:768px){
  .layout{flex-direction:column}
  .sidebar{width:100%;position:static}
  .cal-cell{min-height:60px;padding:2px 3px}
  .event-tag{font-size:9px;padding:1px 4px}
  .cal-cell .day-num{font-size:11px}
}
</style>
</head>

<div class="topbar">

        </div>
        <div class="cal-body" id="calBody"></div>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-card">
        <div class="sc-title"><span class="ico">🎂</span> 本月生辰</div>
        <div class="sc-body" id="birthList"></div>
      </div>
      <div class="sidebar-card">
        <div class="sc-title"><span class="ico">🕯️</span> 本月忌辰</div>
        <div class="sc-body" id="deathList"></div>
      </div>
    </div>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modalTitle">详情</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

var familyData = JSON.parse(localStorage.getItem('cheng_family_tree_v6')) || DEFAULT_DATA;
var curYear, curMonth;

function parseDate(str) {
  if (!str) return null;
  // Handle formats: "1986-02-21", "1986-2-21", "1808", "1986-02-21(农历)"
  str = str.replace(/（农历）|\(农历\)/g, '').trim();
  var parts = str.split('-');
  if (parts.length >= 3) {
    return { y: parseInt(parts[0]), m: parseInt(parts[1]), d: parseInt(parts[2]) };
  } else if (parts.length === 2) {
    return { y: parseInt(parts[0]), m: parseInt(parts[1]), d: null };
  } else if (parts.length === 1 && parts[0].length >= 4) {
    return { y: parseInt(parts[0]), m: null, d: null };
  }
  return null;
}

function getEvents(people) {
  var births = [];
  var deaths = [];
  for (var i = 0; i < people.length; i++) {
    var p = people[i];
    if (p.birth) {
      var bd = parseDate(p.birth);
      if (bd) births.push({ person: p, date: bd, raw: p.birth });
    }
    if (p.death) {
      var dd = parseDate(p.death);
      if (dd) deaths.push({ person: p, date: dd, raw: p.death });
    }
  }
  return { births: births, deaths: deaths };
}

var events = getEvents(familyData.people);

function render() {
  var monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('monthLabel').textContent = monthNames[curMonth];
  document.getElementById('yearLabel').textContent = curYear + '年';

  var firstDay = new Date(curYear, curMonth, 1).getDay();
  var daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
  var daysInPrev = new Date(curYear, curMonth, 0).getDate();

  var today = new Date();
  var todayY = today.getFullYear(), todayM = today.getMonth(), todayD = today.getDate();

  var html = '';
  var cellCount = 0;

  // Previous month trailing days
  for (var i = firstDay - 1; i >= 0; i--) {
    var d = daysInPrev - i;
    html += '<div class="cal-cell other-month"><span class="day-num">' + d + '</span></div>';
    cellCount++;
  }

  // Current month days
  for (var day = 1; day <= daysInMonth; day++) {
    var isToday = (curYear === todayY && curMonth === todayM && day === todayD);
    var isSun = (cellCount % 7 === 0);
    var cls = 'cal-cell' + (isToday ? ' today' : '');

    var dayEvents = '';
    // Births
    for (var b = 0; b < events.births.length; b++) {
      var ev = events.births[b];
      if (ev.date.m === curMonth + 1 && ev.date.d === day) {
        var g = ev.person.gender === 'female' ? 'birth-female' : 'birth-male';
        dayEvents += '<div class="event-tag ' + g + '" onclick="showDetail(\'' + ev.person.id + '\',\'birth\')">' + ev.person.name + '</div>';
      }
    }
    // Deaths
    for (var d2 = 0; d2 < events.deaths.length; d2++) {
      var ev2 = events.deaths[d2];
      if (ev2.date.m === curMonth + 1 && ev2.date.d === day) {
        var g2 = ev2.person.gender === 'female' ? 'death-female' : 'death-male';
        dayEvents += '<div class="event-tag ' + g2 + '" onclick="showDetail(\'' + ev2.person.id + '\',\'death\')">' + ev2.person.name + '</div>';
      }
    }

    html += '<div class="' + cls + '">' +
      '<span class="day-num' + (isSun ? ' sun' : '') + '">' + day + '</span>' +
      '<div class="events">' + dayEvents + '</div>' +
      '</div>';
    cellCount++;
  }

  // Next month leading days
  var remaining = cellCount % 7 === 0 ? 0 : 7 - (cellCount % 7);
  for (var i = 1; i <= remaining; i++) {
    html += '<div class="cal-cell other-month"><span class="day-num">' + i + '</span></div>';
  }

  document.getElementById('calBody').innerHTML = html;

  // Sidebar: this month's events
  renderSidebar();
}

function renderSidebar() {
  var birthHtml = '';
  var deathHtml = '';
  var hasBirth = false, hasDeath = false;

  for (var b = 0; b < events.births.length; b++) {
    var ev = events.births[b];
    if (ev.date.m === curMonth + 1) {
      hasBirth = true;
      var dateStr = (ev.date.d ? ev.date.d + '日' : '');
      var fCls = ev.person.gender === 'female' ? ' female' : '';
      birthHtml += '<div class="sc-item' + fCls + '" onclick="showDetail(\'' + ev.person.id + '\',\'birth\')">' +
        '<span class="sc-date">' + dateStr + '</span>' +
        '<span class="sc-name">' + ev.person.name + '</span>' +
        '<span class="sc-badge birthday">生辰</span></div>';
    }
  }

  for (var d = 0; d < events.deaths.length; d++) {
    var ev = events.deaths[d];
    if (ev.date.m === curMonth + 1) {
      hasDeath = true;
      var dateStr2 = (ev.date.d ? ev.date.d + '日' : '');
      deathHtml += '<div class="sc-item" onclick="showDetail(\'' + ev.person.id + '\',\'death\')">' +
        '<span class="sc-date">' + dateStr2 + '</span>' +
        '<span class="sc-name">' + ev.person.name + '</span>' +
        '<span class="sc-badge memorial">忌辰</span></div>';
    }
  }

  document.getElementById('birthList').innerHTML = hasBirth ? birthHtml : '<div style="text-align:center;color:var(--text-light);font-size:12px;padding:16px 0">暂无记录</div>';
  document.getElementById('deathList').innerHTML = hasDeath ? deathHtml : '<div style="text-align:center;color:var(--text-light);font-size:12px;padding:16px 0">暂无记录</div>';
}

function showDetail(id, type) {
  var person = null;
  for (var i = 0; i < familyData.people.length; i++) {
    if (familyData.people[i].id === id) { person = familyData.people[i]; break; }
  }
  if (!person) return;

  var title = type === 'birth' ? '🎂 生辰' : '🕯️ 忌辰';
  document.getElementById('modalTitle').textContent = title;

  var gText = person.gender === 'female' ? '女' : '男';
  var gCls = person.gender === 'female' ? 'female' : 'male';
  var dateVal = type === 'birth' ? (person.birth || '—') : (person.death || '—');

  var html = '<div class="mb-row"><span class="mb-label">姓名</span><span class="mb-val ' + gCls + '">' + person.name + '</span></div>';
  html += '<div class="mb-row"><span class="mb-label">性别</span><span class="mb-val">' + gText + '</span></div>';
  html += '<div class="mb-row"><span class="mb-label">' + (type === 'birth' ? '出生' : '逝世') + '</span><span class="mb-val">' + dateVal + '</span></div>';
  if (person.spouse) {
    html += '<div class="mb-row"><span class="mb-label">配偶</span><span class="mb-val">' + person.spouse + '</span></div>';
  }
  if (person.residence) {
    html += '<div class="mb-row"><span class="mb-label">现居</span><span class="mb-val">' + person.residence + '</span></div>';
  }

  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function prevMonth() {
  curMonth--;
  if (curMonth < 0) { curMonth = 11; curYear--; }
  render();
}

function nextMonth() {
  curMonth++;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  render();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft') prevMonth();
  if (e.key === 'ArrowRight') nextMonth();
});

var now = new Date();
curYear = now.getFullYear();
curMonth = now.getMonth();
render();
</script>
</body>
</html>
