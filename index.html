<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>东郭程氏族谱</title>
<style>
:root{--bg:#f0e6d0;--bg-grad:#f5efe0;--card-w:210px;--card-h:92px;--level-gap:280px;--sib-gap:12px;--root-gap:60px;--gold:#b8833a;--gold-light:#d4a860;--text:#3d3025;--text-light:#8a7b68;--line:#c4b8a0;--accent:#8b2e2e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Serif SC","STSong","SimSun","KaiTi",serif;background:linear-gradient(180deg,var(--bg-grad),var(--bg));color:var(--text);min-height:100vh;overflow:hidden}

.topbar{background:rgba(255,255,255,0.25);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(200,180,150,0.3);padding:8px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.topbar h1{font-size:16px;letter-spacing:5px;display:flex;align-items:center;gap:10px;color:var(--text)}
.topbar h1 .seal{width:30px;height:30px;border:2px solid var(--gold);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--gold);font-weight:700;background:rgba(184,131,58,0.08)}
.topbar-actions{display:flex;gap:4px;flex-wrap:wrap}
.btn{padding:4px 10px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:11px;letter-spacing:1px;transition:all .2s;display:flex;align-items:center;gap:3px;white-space:nowrap;border:none}
.btn-o{background:rgba(184,131,58,0.06);color:var(--text-light);border:1px solid rgba(184,131,58,0.18)}
.btn-o:hover{background:rgba(184,131,58,0.12);color:var(--gold);border-color:rgba(184,131,58,0.35)}
.btn-p{background:linear-gradient(135deg,var(--gold),#9a6a28);color:#fff;font-weight:600;border:none}
.btn-p:hover{background:linear-gradient(135deg,var(--gold-light),var(--gold))}
.btn-sm{padding:3px 8px;font-size:10px}
.btn-d{background:rgba(180,60,60,0.08);color:#c06060;border:1px solid rgba(180,60,60,0.15)}
.btn-d:hover{background:rgba(180,60,60,0.15)}

.main-wrap{display:flex;height:calc(100vh - 50px)}
.tree-area{flex:1;overflow:auto;position:relative;cursor:grab;
  background:
    radial-gradient(ellipse at 10% 30%,rgba(184,131,58,0.04) 0%,transparent 40%),
    radial-gradient(ellipse at 80% 70%,rgba(184,131,58,0.03) 0%,transparent 40%),
    linear-gradient(rgba(184,131,58,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(184,131,58,0.04) 1px,transparent 1px),
    linear-gradient(180deg,var(--bg-grad),var(--bg));
  background-size:100% 100%,100% 100%,60px 60px,60px 60px,100% 100%}
.tree-area:active{cursor:grabbing}
.tree-container{position:relative;margin:0 auto;transform-origin:0 0}
.lines-svg{position:absolute;top:0;left:0;pointer-events:none;z-index:1;overflow:visible}

.person-node{position:absolute;width:var(--card-w);height:var(--card-h);border-radius:10px;padding:0 4px;display:flex;align-items:center;cursor:pointer;transition:all .2s;user-select:none;z-index:2;font-size:13px;font-weight:600;letter-spacing:1px;overflow:hidden;
  box-shadow:0 2px 8px rgba(100,70,40,0.08),inset 0 1px 0 rgba(255,255,255,0.5)}
.person-node:hover{transform:scale(1.06);z-index:10;
  box-shadow:0 6px 20px rgba(100,70,40,0.12),0 0 15px rgba(184,131,58,0.08),inset 0 1px 0 rgba(255,255,255,0.6)}
.person-node.selected{box-shadow:0 0 0 2px var(--gold),0 4px 16px rgba(184,131,58,0.15);z-index:10}

/* 暖色系深度系统 - 始祖深棕 → 后代渐浅 */
.person-node.depth-0{background:linear-gradient(135deg,#5a3a1a,#7a5030);color:#f5efe0;border:1px solid rgba(184,131,58,0.4)}
.person-node.depth-1{background:linear-gradient(135deg,#7a5830,#9a7048);color:#f0e6d0;border:1px solid rgba(184,131,58,0.35)}
.person-node.depth-2{background:linear-gradient(135deg,#f8f0e0,#fff8f0);color:#3d3025;border:1px solid rgba(184,131,58,0.25)}
.person-node.depth-3{background:linear-gradient(135deg,#faf4e4,#fffaf0);color:#3d3025;border:1px solid rgba(184,131,58,0.2)}
.person-node.depth-4{background:linear-gradient(135deg,#fcf8f0,#fffcf5);color:#3d3025;border:1px solid rgba(184,131,58,0.18)}
.person-node.depth-5{background:linear-gradient(135deg,#fdfaf5,#fffdf8);color:#3d3025;border:1px solid rgba(184,131,58,0.15)}
.person-node.depth-6{background:linear-gradient(135deg,#fefbf7,#fffef9);color:#3d3025;border:1px solid rgba(184,131,58,0.12)}
.person-node.depth-7,.person-node.depth-8{background:linear-gradient(135deg,#fffcf8,#fffef9);color:#3d3025;border:1px solid rgba(184,131,58,0.1)}
.person-node.depth-9,.person-node.depth-10,.person-node.depth-11,.person-node.depth-12{background:#fffdf9;color:#3d3025;border:1px solid rgba(184,131,58,0.08)}

.person-node .avt-mini{width:84px;height:84px;border-radius:50%;margin:0 8px 0 6px;background-size:contain;background-position:center;background-repeat:no-repeat;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;font-weight:bold;flex-shrink:0;box-shadow:0 3px 10px rgba(100,70,40,0.15);border:4px solid transparent}
.person-node .avt-mini.male{background:linear-gradient(135deg,#92b4cc,#adccdd);border-color:#92b4cc}
.person-node .avt-mini.female{background:linear-gradient(135deg,#c898a5,#ddb3bc);border-color:#c898a5}
.person-node .nm-wrap{display:flex;flex-direction:column;min-width:0;flex:1;line-height:1.3;padding:0 12px 0 0}
.person-node .nm{font-size:15px;font-weight:600;letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.person-node.depth-0 .nm,.person-node.depth-1 .nm{text-shadow:0 1px 2px rgba(0,0,0,0.2)}
.person-node .nm-spouse{font-size:11px;opacity:0.65;letter-spacing:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;margin-top:2px;color:var(--gold)}
.person-node.depth-0 .nm-spouse,.person-node.depth-1 .nm-spouse{color:rgba(255,255,255,0.7)}
.person-node .nm-spouse:hover{opacity:1;text-decoration:underline}
.person-node .spouse-heart{font-size:8px;margin-right:2px}

.collapse-btn{position:absolute;width:22px;height:22px;border-radius:50%;border:2px solid rgba(184,131,58,0.35);background:rgba(255,253,248,0.95);cursor:pointer;z-index:5;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--gold);transition:all .2s;line-height:1;box-shadow:0 2px 6px rgba(100,70,40,0.12)}
.collapse-btn:hover{background:var(--gold);color:#fff;border-color:var(--gold);box-shadow:0 2px 8px rgba(184,131,58,0.2)}
.collapse-badge{position:absolute;font-size:10px;color:var(--gold);white-space:nowrap;background:rgba(184,131,58,0.08);padding:3px 8px;border-radius:10px;z-index:5;pointer-events:none;border:1px solid rgba(184,131,58,0.15)}

.detail-panel{width:0;background:#faf6ee;border-left:1px solid #d4c5a0;overflow:hidden;transition:width .3s;display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(100,70,40,0.08)}
.detail-panel.open{width:380px}
.ph{padding:12px 16px;background:linear-gradient(180deg,#f5efe0,#faf6ee);border-bottom:1px solid #d4c5a0;display:flex;align-items:center;justify-content:space-between}
.ph h3{font-size:14px;letter-spacing:3px;color:#5a3a1a}
.pclose{width:26px;height:26px;border:1px solid #c8b898;border-radius:50%;background:transparent;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:#8a7b68;transition:all .2s}
.pclose:hover{background:#e8d8c0;color:#5a3a1a}
.pb{flex:1;overflow-y:auto;padding:0}
.pb .empty{text-align:center;color:#8a7b68;margin-top:80px;font-size:12px}
.pb .empty .ico{font-size:40px;display:block;margin-bottom:10px;opacity:.2}

.detail-card{padding:0;color:#3d2e20}
.detail-top{display:flex;flex-direction:column;align-items:center;padding:20px 16px 16px;border-bottom:1px dashed #d4c5a0}
.detail-avatar-wrap{flex-shrink:0;text-align:center}
.detail-avatar-wrap .avt-big{width:calc(100% - 32px);max-width:340px;aspect-ratio:4/3;border-radius:16px;margin:0 auto 8px;background-size:contain;background-position:center;background-repeat:no-repeat;display:flex;align-items:center;justify-content:center;font-size:40px;color:#fff;font-weight:bold;box-shadow:0 4px 16px rgba(0,0,0,0.1);border:4px solid #fff}
.avt-big.m{background:linear-gradient(135deg,#92b4cc,#adccdd);border-color:#92b4cc}
.avt-big.f{background:linear-gradient(135deg,#c898a5,#ddb3bc);border-color:#c898a5}
.avatar-gender-tag{display:inline-block;padding:2px 8px;font-size:9px;border-radius:8px;font-weight:600;letter-spacing:1px}
.gender-m{background:#eaf2f7;color:#7a9eb5}
.gender-f{background:#f7eff1;color:#b08895}
.detail-info{width:100%;min-width:0}
.detail-info .person-name{font-size:20px;font-weight:700;letter-spacing:3px;margin-bottom:3px;color:#3d2e20;text-align:center}
.detail-info .person-subtitle{font-size:11px;color:#8a7b68;margin-bottom:10px;text-align:center}
.detail-info .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px}
.info-item .info-lbl{font-size:9px;color:#b8833a;letter-spacing:2px;font-weight:600;margin-bottom:1px}
.info-item .info-val{font-size:12px;color:#3d2e20;line-height:1.4}

.detail-section{margin-bottom:14px;padding:0 16px 12px;border-bottom:1px solid #e8dcc8}
.detail-section:last-child{border-bottom:none;margin-bottom:0}
.detail-section .sec-title{font-size:11px;font-weight:700;color:#5a3a1a;letter-spacing:3px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.detail-section .sec-title::after{content:"";flex:1;height:1px;background:#e0d0b8}
.relation-list{display:flex;flex-wrap:wrap;gap:5px}
.relation-tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:10px;cursor:pointer;transition:all .2s;letter-spacing:1px}
.relation-tag.parent{background:#f5efe0;color:#6b4a2a;border:1px solid #d4c5a0}
.relation-tag.child{background:#eaf2f7;color:#7a9eb5;border:1px solid #c5d5e2}
.relation-tag.spouse{background:#f7eff1;color:#b08895;border:1px solid #dcc8cc}
.relation-tag:hover{transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,0.08)}
.note-block{background:linear-gradient(135deg,#fdf8f0,#faf4e8);border-radius:6px;padding:12px 14px;font-size:12px;line-height:1.8;color:#5a4a3a;border-left:3px solid #b8833a;font-style:italic}
.photo-change{margin-top:4px;font-size:9px;color:#8a7b68;cursor:pointer;border:1px dashed #c8b898;border-radius:3px;padding:2px 6px;display:inline-block;transition:all .2s}
.photo-change:hover{border-color:#b8833a;color:#5a3a1a}
.photo-change input{display:none}
.pa{padding:10px 16px;border-top:1px solid #d4c5a0;display:flex;gap:5px;flex-wrap:wrap;background:#f5efe0}
.pa .btn-o{background:#fffef9;border-color:#c8b898;color:#6b4a2a}
.pa .btn-o:hover{background:#e8d8c0;border-color:#b8833a}

.modal-ov{position:fixed;inset:0;background:rgba(60,50,35,0.4);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.modal{background:#faf6ee;border-radius:12px;padding:24px;width:90%;max-width:460px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 50px rgba(100,70,40,0.2);border:1px solid #d4c5a0;animation:slideUp .3s;color:#3d2e20}
.modal h3{font-size:16px;margin-bottom:14px;text-align:center;letter-spacing:3px;color:#5a3a1a}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:10px;color:#8a7b68;margin-bottom:3px;letter-spacing:1px}
.fg input,.fg select,.fg textarea{width:100%;padding:7px 10px;border:1px solid #d4c5a0;border-radius:6px;background:#fffef9;font-family:inherit;font-size:12px;color:#3d2e20;transition:all .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#b8833a;box-shadow:0 0 0 3px rgba(184,131,58,0.08)}
.fr{display:flex;gap:6px}.fr .fg{flex:1}
.ma{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}

.legend{position:fixed;bottom:10px;left:10px;z-index:50;background:rgba(255,253,248,0.92);backdrop-filter:blur(8px);border:1px solid rgba(184,131,58,0.15);border-radius:8px;padding:6px 14px;display:flex;gap:12px;font-size:10px}
.legend i{display:flex;align-items:center;gap:4px;font-style:normal;color:var(--text-light)}
.legend .ld{width:10px;height:10px;border-radius:3px;display:inline-block}
.ld.d0{background:linear-gradient(135deg,#5a3a1a,#7a5030)}.ld.d1{background:linear-gradient(135deg,#7a5830,#9a7048)}.ld.d2{background:linear-gradient(135deg,#f8f0e0,#fff8f0);border:1px solid rgba(184,131,58,0.25)}.ld.d3{background:linear-gradient(135deg,#faf4e4,#fffaf0);border:1px solid rgba(184,131,58,0.2)}.ld.d4{background:linear-gradient(135deg,#fcf8f0,#fffcf5);border:1px solid rgba(184,131,58,0.18)}
.stats{position:fixed;bottom:10px;right:10px;z-index:50;background:rgba(255,253,248,0.92);backdrop-filter:blur(8px);border:1px solid rgba(184,131,58,0.15);border-radius:8px;padding:6px 14px;font-size:10px;color:var(--text-light)}

/* View tabs */
.view-tabs{display:flex;justify-content:center;gap:0;padding:8px 0;background:rgba(255,253,248,0.85);backdrop-filter:blur(10px);border-bottom:1px solid rgba(184,131,58,0.12);position:sticky;top:46px;z-index:99}
.view-tab{padding:5px 18px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:12px;letter-spacing:1px;color:var(--text-light);border-radius:16px;transition:all .2s}
.view-tab:hover{color:var(--gold)}
.view-tab.active{background:linear-gradient(135deg,var(--gold),#9a6a28);color:#fff;font-weight:600}

/* List view */
.list-view{flex:1;overflow-y:auto;padding:20px 30px;background:linear-gradient(180deg,var(--bg-grad),var(--bg));min-height:calc(100vh - 90px)}
.gen-section{margin-bottom:28px}
.gen-title{font-size:15px;font-weight:700;color:#5a3a1a;letter-spacing:3px;margin-bottom:14px;padding-left:8px;border-left:3px solid var(--gold)}
.gen-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:14px}
.list-card{background:#fff;border:1px solid rgba(184,131,58,0.15);border-radius:14px;padding:16px 20px;cursor:pointer;transition:all .2s;box-shadow:0 1px 4px rgba(100,70,40,0.04)}
.list-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(100,70,40,0.08);border-color:rgba(184,131,58,0.3)}
.list-card-layout{display:flex;align-items:flex-start;gap:16px}
.list-card-avt{width:100px;height:100px;border-radius:50%;flex-shrink:0;background-size:contain;background-position:center;background-repeat:no-repeat;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;font-weight:bold;border:5px solid transparent;box-shadow:0 3px 12px rgba(100,70,40,0.15)}
.list-card-avt.m{background:linear-gradient(135deg,#92b4cc,#adccdd);border-color:#92b4cc}
.list-card-avt.f{background:linear-gradient(135deg,#c898a5,#ddb3bc);border-color:#c898a5}
.list-card-body{flex:1;min-width:0}
.list-card-name{font-size:18px;font-weight:700;color:#3d3025;letter-spacing:2px;margin-bottom:6px}
.list-card-meta{font-size:11px;color:var(--text-light);margin-top:2px}
.list-card-relations{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;font-size:12px}
.list-card-relations .rel-label{color:var(--text-light);margin-right:2px}
.list-card-relations .rel-name{color:var(--gold);cursor:pointer}
.list-card-relations .rel-name:hover{text-decoration:underline}
.list-card-desc{font-size:11px;color:#6a5a4a;line-height:1.6;margin-top:8px;padding-top:8px;border-top:1px dashed rgba(184,131,58,0.12)}
.list-card-dates{font-size:10px;color:var(--text-light);margin-top:6px;display:flex;align-items:center;gap:4px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:768px){
  .main-wrap{flex-direction:column}
  .detail-panel{width:100%!important;height:0;border-left:none;border-top:1px solid #c8b898}
  .detail-panel.open{height:50vh;width:100%!important}
}
</style>
</head>
<body>
<div class="topbar">
  <h1><span class="seal">程</span>东郭程氏族谱</h1>
  <div class="topbar-actions">
    <button class="btn btn-o" onclick="doZoom(-1)">- 缩小</button>
    <button class="btn btn-o" onclick="doZoom(1)">+ 放大</button>
    <button class="btn btn-o" onclick="resetView()">重置视图</button>
    <button class="btn btn-o" onclick="expandAll()">全部展开</button>
    <button class="btn btn-o" onclick="collapseDeep()">收起深层</button>
    <button class="btn btn-o" onclick="searchPerson()">查找成员</button>
    <button class="btn btn-p" onclick="handleAdd(null)">+ 添加先祖</button>
    <a href="vr.html" class="btn btn-o" style="text-decoration:none">&#127775; 全景</a>
    <a href="gallery.html" class="btn btn-o" style="text-decoration:none">&#128444; 照片墙</a>
    <a href="family-memory.html" class="btn btn-o" style="text-decoration:none">&#128220; 家族记忆</a>
    <button class="btn btn-o" onclick="exportData()">&#128190; 导出数据</button>
    <button class="btn btn-o" onclick="document.getElementById('importFile').click()">&#128194; 导入数据</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>
<div class="view-tabs" id="viewTabs">
  <button class="view-tab active" onclick="switchView('tree')" id="tabTree">&#127795; 树状视图</button>
  <button class="view-tab" onclick="switchView('list')" id="tabList">&#128196; 列表视图</button>
</div>
<div class="main-wrap" id="mainWrap">
  <div class="tree-area" id="treeArea">
    <div class="tree-container" id="treeContainer">
      <svg class="lines-svg" id="linesSvg"></svg>
    </div>
  </div>
  <div class="list-view" id="listView" style="display:none"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="ph"><h3 id="panelTitle">家族成员</h3><button class="pclose" onclick="closePanel()">&#10005;</button></div>
    <div class="pb" id="panelBody"><div class="empty"><span class="ico">&#128100;</span><p>点击人物查看详情</p></div></div>
    <div class="pa" id="panelActions" style="display:none">
      <button class="btn btn-o btn-sm" onclick="handleEdit()">编辑</button>
      <button class="btn btn-o btn-sm" onclick="handleAdd(selectedId)">+ 添加子女</button>
      <button class="btn btn-d btn-sm" onclick="handleDelete()">删除</button>
    </div>
  </div>
</div>
<div class="legend">
  <i><span class="ld d0"></span>始祖</i>
  <i><span class="ld d1"></span>第二代</i>
  <i><span class="ld d2"></span>第三代</i>
  <i><span class="ld d3"></span>第四代</i>
  <i><span class="ld d4"></span>第五代</i>
</div>
<div class="stats">共 <b id="statsCount">0</b> 人</div>

      var d = JSON.parse(ev.target.result);
      if (!d || !d.people || !Array.isArray(d.people)) {
        alert('数据格式错误：缺少 people 数组');
        return;
      }
      if (!confirm('导入将覆盖当前所有数据，共 ' + d.people.length + ' 人。确认导入？')) return;
      familyData = d;
      saveData();
      selectedId = null;
      closePanel();
      buildTree();
      renderTree();
      alert('导入成功！共 ' + d.people.length + ' 人');
    } catch(err) {
      alert('文件解析失败：' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

var NW = 210, NH = 92, LG = 280, SG = 10, RG = 60, LP = 60, TP = 40;

function buildTree() {
  var map = {};
  familyData.people.forEach(function(p) {
    map[p.id] = Object.assign({}, p, {children: []});
  });
  familyData.people.forEach(function(p) {
    if (p.parentId && map[p.parentId]) {
      map[p.parentId].children.push(map[p.id]);
    }
  });
  var roots = familyData.people
    .filter(function(p) { return !p.parentId; })
    .map(function(p) { return map[p.id]; })
    .filter(function(p) { return p.gender === 'male'; });
  return {roots: roots, map: map};
}

function countDesc(node) {
  if (!node.children || !node.children.length) return 0;
  var c = node.children.length;
  node.children.forEach(function(ch) { c += countDesc(ch); });
  return c;
}

function calcLayout() {
  var t = buildTree();
  if (!t.roots.length) return {nodes:[], conns:[], w:0, h:0};

  var vroot = {id:'__vroot__', name:'东郭程家家谱', gender:'male', isVirtual:true, children: t.roots, depth: -1};
  var curY = TP;

  function lay(nd, dep) {
    nd.depth = dep;
    nd.x = dep * LG + LP;
    if (nd.isVirtual) {
      nd.children.forEach(function(c) { lay(c, dep+1); });
      if (nd.children.length) {
        nd.y = (nd.children[0].y + nd.children[nd.children.length-1].y) / 2;
      } else { nd.y = TP; }
      return;
    }
    if (collapsedNodes[nd.id] || !nd.children || !nd.children.length) {
      nd.y = curY;
      curY += NH + SG;
      return;
    }
    nd.children.forEach(function(c) { lay(c, dep+1); });
    nd.y = (nd.children[0].y + nd.children[nd.children.length-1].y) / 2;
  }

  lay(vroot, -1);

  // Spacing between root subtrees
  var lastEnd = 0;
  t.roots.forEach(function(root, i) {
    var sub = [];
    function collect(n) { sub.push(n); if (!collapsedNodes[n.id] && n.children) n.children.forEach(collect); }
    collect(root);
    var minY = sub.reduce(function(m,n){return Math.min(m,n.y);}, Infinity);
    var maxY = sub.reduce(function(m,n){return Math.max(m,n.y+NH);}, -Infinity);
    if (i > 0 && minY < lastEnd + RG) {
      var shift = lastEnd + RG - minY;
      sub.forEach(function(n) { n.y += shift; });
      maxY += shift;
    }
    lastEnd = maxY;
  });

  // Recenter virtual root
  if (t.roots.length) {
    vroot.y = (t.roots[0].y + t.roots[t.roots.length-1].y) / 2;
  }

  var nodes = [], conns = [], seen = {};
  function walk(nd) {
    if (!nd.isVirtual && !seen[nd.id]) {
      seen[nd.id] = true;
      // Find spouse person for photo
      var spousePhoto = '';
      if (nd.spouse) {
        var spPerson = null;
        for (var si = 0; si < familyData.people.length; si++) {
          if (familyData.people[si].name === nd.spouse) { spPerson = familyData.people[si]; break; }
        }
        if (spPerson && spPerson.photo) spousePhoto = spPerson.photo;
      }
      nodes.push({
        id: nd.id, name: nd.name, gender: nd.gender,
        birth: nd.birth||'', death: nd.death||'', photo: nd.photo||'',
        residence: nd.residence||'', occupation: nd.occupation||'',
        contact: nd.contact||'', spouse: nd.spouse||'', notes: nd.notes||'',
        spousePhoto: spousePhoto,
        x: nd.x, y: nd.y, depth: nd.depth,
        hasChildren: !!(nd.children && nd.children.length),
        collapsed: !!collapsedNodes[nd.id],
        hiddenCount: collapsedNodes[nd.id] ? countDesc(nd) : 0
      });
    }
    if (nd.children) {
      nd.children.forEach(function(ch) {
        if (nd.isVirtual || !collapsedNodes[nd.id]) {
          conns.push({
            x1: nd.isVirtual ? nd.x + NW/2 : nd.x + NW,
            y1: nd.y + NH/2,
            x2: ch.x,
            y2: ch.y + NH/2,
            isRoot: nd.isVirtual
          });
          walk(ch);
        }
      });
    }
  }
  walk(vroot);

  var mxX = 800, mxY = 600;
  nodes.forEach(function(n) { mxX = Math.max(mxX, n.x + NW + LP); mxY = Math.max(mxY, n.y + NH + TP); });
  return {nodes: nodes, conns: conns, w: mxX, h: mxY};
}

var currentView = 'tree';
function switchView(v) {
  currentView = v;
  document.getElementById('tabTree').classList.toggle('active', v === 'tree');
  document.getElementById('tabList').classList.toggle('active', v === 'list');
  document.getElementById('treeArea').style.display = v === 'tree' ? 'block' : 'none';
  document.getElementById('listView').style.display = v === 'list' ? 'block' : 'none';
  if (v === 'tree') render();
  else renderListView();
}

function renderListView() {
  var container = document.getElementById('listView');
  var map = {};
  familyData.people.forEach(function(p) { map[p.id] = p; });

  // Group by generation (depth)
  var t = buildTree();
  var gens = {};
  function walk(nd, dep) {
    nd.depth = dep;
    if (!nd.isVirtual) {
      if (!gens[dep]) gens[dep] = [];
      gens[dep].push(nd);
    }
    if (nd.children) nd.children.forEach(function(c) { walk(c, dep+1); });
  }
  walk(t.map.__vroot__ || {isVirtual:true, children:t.roots, depth:-1}, 0);

  var genNames = ['始祖','第一代','第二代','第三代','第四代','第五代','第六代','第七代','第八代','第九代','第十代'];
  var html = '';
  Object.keys(gens).sort(function(a,b){return +a-+b;}).forEach(function(g) {
    var people = gens[g];
    var title = genNames[g] || '第' + g + '代';
    html += '<div class="gen-section">';
    html += '<div class="gen-title">' + title + ' <span style="font-size:11px;color:var(--text-light);font-weight:400">(' + people.length + '人)</span></div>';
    html += '<div class="gen-cards">';
    people.forEach(function(p) {
      var sym = p.gender === 'male' ? '\u2642' : '\u2640';
      var avtClass = p.gender === 'male' ? 'm' : 'f';
      var spouse = p.spouse || '';
      var children = familyData.people.filter(function(ch){return ch.parentId === p.id;});
      var birth = p.birth || '', death = p.death || '';
      var dates = birth || death ? (birth + (death ? ' - ' + death : '')) : '';

      var avtHtml = p.photo
        ? '<div class="list-card-avt '+avtClass+'" style="background-image:url('+p.photo+')"></div>'
        : '<div class="list-card-avt '+avtClass+'">'+sym+'</div>';

      html += '<div class="list-card" onclick="selectPerson(\''+p.id+'\')">';
      html += '<div class="list-card-layout">';
      html += avtHtml;
      html += '<div class="list-card-body">';
      html += '<div class="list-card-name">'+esc(p.name)+'</div>';
      if (spouse) html += '<div class="list-card-meta">\u2665 '+esc(spouse)+'</div>';

      html += '<div class="list-card-relations">';
      if (p.parentId && map[p.parentId]) {
        html += '<span><span class="rel-label">\u7236\u4eb2\uff1a</span><span class="rel-name" onclick="event.stopPropagation();selectPerson(\''+p.parentId+'\')">'+esc(map[p.parentId].name)+'</span></span>';
      }
      if (children.length) {
        html += '<span><span class="rel-label">\u5b50\u55e3\uff1a</span>';
        children.forEach(function(ch, i) {
          html += '<span class="rel-name" onclick="event.stopPropagation();selectPerson(\''+ch.id+'\')">'+esc(ch.name)+'</span>' + (i < children.length-1 ? '\u3001' : '');
        });
        html += '</span>';
      }
      html += '</div>';

      if (p.notes || p.residence || p.occupation) {
        var desc = p.notes || '';
        html += '<div class="list-card-desc">'+esc(desc)+'</div>';
      }
      if (dates) {
        html += '<div class="list-card-dates">&#128197; '+dates+'</div>';
      }
      html += '</div></div></div>';
    });
    html += '</div></div>';
  });
  container.innerHTML = html;
}

function render() {
  var cont = document.getElementById('treeContainer');
  var svg = document.getElementById('linesSvg');

  // Clear old nodes
  var old = cont.querySelectorAll('.person-node,.collapse-btn,.collapse-badge');
  for (var i = 0; i < old.length; i++) old[i].remove();

  var layout = calcLayout();
  var nodes = layout.nodes, conns = layout.conns;
  var total = familyData.people.length;

  // Stats
  var hidden = 0;
  for (var k in collapsedNodes) {
    var nd = familyData.people.filter(function(p){return p.id===k;})[0];
    if (nd) hidden += countDesc(tmap()[k]);
  }
  document.getElementById('statsCount').textContent = total + ' 人';

  if (!nodes.length) return;

  cont.style.width = layout.w + 'px';
  cont.style.height = layout.h + 'px';

  // Draw SVG lines
  var paths = '';
  // SVG defs - warm brown gradient & shadow for visible lines
  var defs = '<defs>';
  defs += '<filter id="lineShadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(100,70,40,0.25)"/></filter>';
  defs += '<filter id="lineGlow"><feGaussianBlur stdDeviation="2" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  defs += '</defs>';

  function roundedPath(x1, y1, x2, y2, r) {
    // Horizontal-right then vertical then horizontal-right, with rounded corners
    var dy = y2 - y1;
    var dirY = dy > 0 ? 1 : -1;
    var absDy = Math.abs(dy);
    
    if (absDy < 2) {
      // Pure horizontal line
      return 'M' + x1 + ',' + y1 + ' L' + x2 + ',' + y2;
    }
    
    // Clamp radius to half the vertical distance
    var cr = Math.min(r, absDy / 2);
    var midX = x1 + (x2 - x1) * 0.5;
    
    return 'M' + x1 + ',' + y1 +
      ' L' + (midX - cr) + ',' + y1 +
      ' Q' + midX + ',' + y1 + ' ' + midX + ',' + (y1 + cr * dirY) +
      ' L' + midX + ',' + (y2 - cr * dirY) +
      ' Q' + midX + ',' + y2 + ' ' + (midX + cr) + ',' + y2 +
      ' L' + x2 + ',' + y2;
  }

  conns.forEach(function(c) {
    var d = roundedPath(c.x1, c.y1, c.x2, c.y2, 14);
    if (c.isRoot) {
      // Root connections: thicker gold line with glow
      paths += '<path d="' + d + '" fill="none" stroke="#a6732a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#lineGlow)" opacity="0.95"/>';
      paths += '<path d="' + d + '" fill="none" stroke="#d4a860" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>';
    } else {
      // Child connections: warm brown with shadow
      paths += '<path d="' + d + '" fill="none" stroke="#9a6a28" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#lineShadow)" opacity="0.9"/>';
      paths += '<path d="' + d + '" fill="none" stroke="#c4954a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>';
    }
  });
  svg.innerHTML = defs + paths;
  svg.setAttribute('width', layout.w);
  svg.setAttribute('height', layout.h);

  // Create node elements
  nodes.forEach(function(n) {
    var el = document.createElement('div');
    el.className = 'person-node depth-' + Math.min(n.depth, 10);
    if (n.id === selectedId) el.classList.add('selected');
    el.style.left = n.x + 'px';
    el.style.top = n.y + 'px';
    el.setAttribute('data-id', n.id);

    var sym = n.gender === 'male' ? '\u2642' : '\u2640';
    var avtClass = n.gender === 'male' ? 'male' : 'female';
    var avtHtml = n.photo
      ? '<div class="avt-mini '+avtClass+'" style="background-image:url('+n.photo+')"></div>'
      : '<div class="avt-mini '+avtClass+'">'+sym+'</div>';

    // Spouse line
    var spouseHtml = '';
    if (n.spouse) {
      var sp = null;
      for (var si = 0; si < familyData.people.length; si++) {
        if (familyData.people[si].name === n.spouse) { sp = familyData.people[si]; break; }
      }
      if (sp) {
        spouseHtml = '<div class="nm-spouse" onclick="event.stopPropagation();selectPerson(\''+sp.id+'\')"><span class="spouse-heart">\u2665</span>'+esc(n.spouse)+'</div>';
      } else {
        spouseHtml = '<div class="nm-spouse"><span class="spouse-heart">\u2665</span>'+esc(n.spouse)+'</div>';
      }
    }
    el.innerHTML = avtHtml + '<div class="nm-wrap"><div class="nm" title="'+esc(n.name)+'">'+esc(n.name)+'</div>' + spouseHtml + '</div>';

    el.addEventListener('click', function(e) { e.stopPropagation(); selectPerson(n.id); });
    cont.appendChild(el);

    // Collapse badge
    if (n.collapsed && n.hiddenCount > 0) {
      var badge = document.createElement('div');
      badge.className = 'collapse-badge';
      badge.style.left = (n.x + NW + 6) + 'px';
      badge.style.top = (n.y + NH/2 - 10) + 'px';
      badge.textContent = '+' + n.hiddenCount;
      cont.appendChild(badge);
    }

    // Collapse button
    if (n.hasChildren) {
      var btn = document.createElement('div');
      btn.className = 'collapse-btn';
      btn.style.left = (n.x + NW - 10) + 'px';
      btn.style.top = (n.y + NH/2 - 11) + 'px';
      btn.textContent = n.collapsed ? '+' : '-';
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (collapsedNodes[n.id]) delete collapsedNodes[n.id];
        else collapsedNodes[n.id] = true;
        render();
      });
      cont.appendChild(btn);
    }
  });

  applyTransform();
}

function tmap() {
  var m = {};
  familyData.people.forEach(function(p) {
    m[p.id] = Object.assign({}, p, {children: familyData.people.filter(function(c){return c.parentId===p.id;})});
  });
  return m;
}

function toggleCollapse(id) {
  if (collapsedNodes[id]) delete collapsedNodes[id];
  else collapsedNodes[id] = true;
  render();
}
function expandAll() { collapsedNodes = {}; render(); }
function collapseDeep() {
  var t = buildTree();
  function mark(nd, d) {
    if (d >= 3 && nd.children && nd.children.length) collapsedNodes[nd.id] = true;
    (nd.children||[]).forEach(function(c){ mark(c, d+1); });
  }
  t.roots.forEach(function(r){ mark(r, 0); });
  render();
}

function applyTransform() {
  var c = document.getElementById('treeContainer');
  c.style.transform = 'scale(' + scale + ')';
}
function doZoom(dir) {
  scale = Math.max(0.15, Math.min(3, scale + dir * 0.1));
  applyTransform();
}
function resetView() { scale = 0.75; applyTransform(); }

function uploadPhoto(e) {
  var f = e.target.files[0];
  if (!f) return;
  if (f.size > 2*1024*1024) { alert('照片不超过2MB'); return; }
  var r = new FileReader();
  r.onload = function(ev) {
    var p = familyData.people.filter(function(x){return x.id===selectedId;})[0];
    if (p) { p.photo = ev.target.result; saveData(); selectPerson(selectedId); render(); }
  };
  r.readAsDataURL(f);
}

        '<div class="ma" style="justify-content:center">' +
          '<button class="btn btn-o" onclick="closeModal()" style="padding:8px 20px">取消</button>' +
          '<button class="btn" style="padding:8px 20px;background:rgba(180,60,60,0.9);color:#fff;font-weight:600" onclick="confirmDelete()">确认删除</button>' +
        '</div>' +
      '</div>' +
    '</div>';
}

function confirmDelete() {
  if (!selectedId) return;
  familyData.people.forEach(function(x) { if (x.parentId===selectedId) x.parentId=null; });
  familyData.people = familyData.people.filter(function(x){return x.id!==selectedId;});
  saveData(); closeModal(); closePanel(); render();
}

function showForm(title, person) {
  var d = person || {name:'',gender:'male',birth:'',death:'',residence:'',occupation:'',contact:'',spouse:'',notes:'',photo:''};
  editPhoto = d.photo || null;
  var sym = d.gender==='male' ? '\u2642' : '\u2640';
  var avCls = d.gender==='male' ? 'm' : 'f';
  var photoStyle = d.photo ? 'style="background-image:url('+d.photo+')"' : '';
  var avtInner = d.photo ? '' : sym;

  document.getElementById('modalBox').innerHTML =
    '<div class="modal-ov" onclick="closeModal(event)">' +
      '<div class="modal" onclick="event.stopPropagation()">' +
        '<h3>'+esc(title)+'</h3>' +
        '<div style="text-align:center;margin-bottom:10px">' +
          '<div class="avt-big '+avCls+'" id="previewAvt" '+photoStyle+'>'+avtInner+'</div>' +
          '<label style="display:inline-block;margin-top:4px;font-size:9px;color:#8a7b68;cursor:pointer;border:1px dashed #c8b898;border-radius:3px;padding:2px 8px">上传照片 <input type="file" accept="image/*" onchange="previewPhoto(event)" style="display:none"></label>' +
        '</div>' +
        '<div class="fr"><div class="fg"><label>姓名 *</label><input id="fName" value="'+esc(d.name)+'" placeholder="姓名"></div>' +
        '<div class="fg"><label>性别</label><select id="fGender"><option value="male"'+(d.gender==='male'?' selected':'')+'>男</option><option value="female"'+(d.gender==='female'?' selected':'')+'>女</option></select></div></div>' +
        '<div class="fr"><div class="fg"><label>出生年份</label><input id="fBirth" value="'+esc(d.birth||'')+'" placeholder="如1950"></div>' +
        '<div class="fg"><label>逝世年份</label><input id="fDeath" value="'+esc(d.death||'')+'" placeholder="如2020"></div></div>' +
        '<div class="fg"><label>现居地</label><input id="fResidence" value="'+esc(d.residence||'')+'" placeholder="省/市/区"></div>' +
        '<div class="fr"><div class="fg"><label>职业</label><input id="fOccupation" value="'+esc(d.occupation||'')+'" placeholder="职业"></div>' +
        '<div class="fg"><label>联系方式</label><input id="fContact" value="'+esc(d.contact||'')+'" placeholder="电话/微信"></div></div>' +
        '<div class="fg"><label>配偶姓名</label><input id="fSpouse" value="'+esc(d.spouse||'')+'" placeholder="配偶"></div>' +
        '<div class="fg"><label>备注</label><textarea id="fNotes" rows="2">'+esc(d.notes||'')+'</textarea></div>' +
        '<div class="ma"><button class="btn btn-o" onclick="closeModal()">取消</button><button class="btn btn-p" onclick="savePerson()">保存</button></div>' +
      '</div>' +
    '</div>';
}

function previewPhoto(e) {
  var f = e.target.files[0];
  if (!f) return;
  if (f.size > 2*1024*1024) { alert('不超过2MB'); return; }
  var r = new FileReader();
  r.onload = function(ev) {
    editPhoto = ev.target.result;
    var av = document.getElementById('previewAvt');
    if (av) { av.style.backgroundImage = 'url('+editPhoto+')'; av.textContent = ''; }
  };
  r.readAsDataURL(f);
}

function savePerson() {
  var name = document.getElementById('fName').value.trim();
  if (!name) { alert('请输入姓名'); return; }
  if (editId) {
    // Editing existing person: preserve parentId from original record
    var idx = -1;
    for (var i = 0; i < familyData.people.length; i++) {
      if (familyData.people[i].id === editId) { idx = i; break; }
    }
    if (idx >= 0) {
      var orig = familyData.people[idx];
      orig.name = name;
      orig.gender = document.getElementById('fGender').value;
      orig.birth = document.getElementById('fBirth').value.trim();
      orig.death = document.getElementById('fDeath').value.trim() || null;
      orig.residence = document.getElementById('fResidence').value.trim();
      orig.occupation = document.getElementById('fOccupation').value.trim();
      orig.contact = document.getElementById('fContact').value.trim();
      orig.spouse = document.getElementById('fSpouse').value.trim() || null;
      orig.notes = document.getElementById('fNotes').value.trim();
      if (editPhoto) orig.photo = editPhoto;
    }
  } else {
    // Adding new person: use editParentId
    var pd = {
      id: 'p' + Date.now(),
      name: name,
      gender: document.getElementById('fGender').value,
      birth: document.getElementById('fBirth').value.trim(),
      death: document.getElementById('fDeath').value.trim() || null,
      residence: document.getElementById('fResidence').value.trim(),
      occupation: document.getElementById('fOccupation').value.trim(),
      contact: document.getElementById('fContact').value.trim(),
      spouse: document.getElementById('fSpouse').value.trim() || null,
      notes: document.getElementById('fNotes').value.trim(),
      photo: editPhoto || '',
      parentId: editParentId
    };
    familyData.people.push(pd);
  }
  saveData();
  editPhoto = null;
  closeModal();
  render();
  if (editId) selectPerson(editId);
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modalBox').innerHTML = '';
  editId = null;
  editParentId = null;
  editPhoto = null;
}

function esc(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function searchPerson() {
  var q = prompt('请输入姓名：');
  if (!q || !q.trim()) return;
  var q2 = q.trim();
  var found = familyData.people.filter(function(p){return p.name.indexOf(q2)>=0;});
  if (!found.length) { alert('未找到 "'+q2+'"'); return; }
  // Expand all ancestors
  found.forEach(function(p) {
    var cur = p;
    while (cur && cur.parentId) {
      delete collapsedNodes[cur.parentId];
      cur = familyData.people.filter(function(x){return x.id===cur.parentId;})[0];
    }
  });
  render();
  if (found.length === 1) { selectPerson(found[0].id); return; }
  var list = found.map(function(p,i){return (i+1)+'. '+p.name;}).join('\n');
  var idx = parseInt(prompt('找到 '+found.length+' 人：\n'+list+'\n\n输入序号：'));
  if (idx >= 1 && idx <= found.length) selectPerson(found[idx-1].id);
}

// Mouse drag panning
var treeArea = document.getElementById('treeArea');
treeArea.addEventListener('mousedown', function(e) {
  if (e.button !== 0) return;
  if (e.target.closest('.person-node') || e.target.closest('.collapse-btn')) return;
  isPanning = true;
  panX = e.clientX;
  panY = e.clientY;
  treeArea.style.cursor = 'grabbing';
});
document.addEventListener('mousemove', function(e) {
  if (!isPanning) return;
  e.preventDefault();
  treeArea.scrollLeft -= (e.clientX - panX);
  treeArea.scrollTop -= (e.clientY - panY);
  panX = e.clientX;
  panY = e.clientY;
});
document.addEventListener('mouseup', function() {
  isPanning = false;
  treeArea.style.cursor = 'grab';
});

// Ctrl+Wheel zoom
treeArea.addEventListener('wheel', function(e) {
  if (e.ctrlKey) {
    e.preventDefault();
    doZoom(e.deltaY < 0 ? 1 : -1);
  }
}, {passive: false});

// Keyboard
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('modalBox').innerHTML) closeModal();
    else closePanel();
  }
});

// Click background to close panel
treeArea.addEventListener('click', function(e) {
  if (!e.target.closest('.person-node') && !e.target.closest('.collapse-btn')) closePanel();
});

// Init
familyData = loadData();
render();
</script>
</body>
</html>
